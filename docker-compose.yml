version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: attendance_db_container
    ports:
      - "5433:5432" # Host 5433 to avoid conflict with local DB
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
